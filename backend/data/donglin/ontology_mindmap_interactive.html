### L2 中国通用 ABox · AuditRule (5 条)

#### 中注协规则 (4)
- CASH-RULE-001 银行账面 vs 询证函一致性
  - source `中注协 2023-12`
  - severity `high`
  - formal `abs(book - confirmation) < 0.01`
- CASH-RULE-002 大额现金审批
  - source `中注协 2023-12`
  - formal `amount >= 500000`
- REV-RULE-001 收入截止性核查
  - source `中注协 2023-12`
  - formal `abs(voucher_date - period_end) <= 5 days`
- FA-RULE-001 固定资产折旧重算 (CSA 1221 四级梯度)
  - source `中注协 2023-12`
  - formal `|book_dep - recomputed_dep| split by [SUM, TE, PM]`

#### 财政部规则 (1)
- TAX-RULE-001 业务招待费 5‰/60% 孰低
  - source `财政部 2008-01`
  - formal `deductible = min(revenue * 0.005, actual * 0.6)`

- ⭐ AR-RULE-001 应收账款贷方余额重分类

  - formal `closing_cr > 0`

#### 存货 (1)
- ⭐ INV-RULE-001 存货归零异常检测

- **Computed** 计算导出 → 灰色
- **RuleDerived** 规则触发 → 粉色 (含 📜 角标)
- **Knowledge** 本体知识 → 紫色

<!-- Markmap CDN -->
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/markmap-view@0.18"></script>
<script src="https://cdn.jsdelivr.net/npm/markmap-lib@0.18"></script>

<script>
let mm = null;
let root = null;

// 加载并渲染思维导图
(function init() {
  const loading = document.getElementById('loading');
  const sourceEl = document.getElementById('md-source');
  const svg = document.getElementById('mindmap');

  // 等 markmap 加载完
  function waitForMarkmap() {
    if (typeof markmap === 'undefined' || !markmap.Markmap || !window.markmap?.Transformer) {
      setTimeout(waitForMarkmap, 100);
      return;
    }

    try {
      const { Transformer } = window.markmap;
      const { Markmap } = markmap;

      const transformer = new Transformer();
      const md = sourceEl.textContent;
      const { root: rootData, features } = transformer.transform(md);
      root = rootData;

      mm = Markmap.create(svg, {
        colorFreezeLevel: 2,
        initialExpandLevel: 2,
        maxWidth: 280,
        duration: 350,
        spacingHorizontal: 90,
        spacingVertical: 6,
        paddingX: 8,
      }, rootData);

      loading.classList.add('hidden');
    } catch (e) {
      console.error(e);
      loading.innerHTML = '⚠️ 加载失败: ' + e.message;
    }
  }

  waitForMarkmap();
})();

// 全部展开
function expandAll() {
  if (!mm || !root) return;
  function walk(node) {
    if (node.payload) node.payload.fold = 0;
    if (node.children) node.children.forEach(walk);
  }
  walk(root);
  mm.setData(root);
  mm.fit();
}

// 折叠到指定层级
function collapseToLevel(level) {
  if (!mm || !root) return;
  function walk(node, depth) {
    if (node.payload) {
      node.payload.fold = depth >= level ? 1 : 0;
    }
    if (node.children) {
      node.children.forEach((c) => walk(c, depth + 1));
    }
  }
  walk(root, 0);
  mm.setData(root);
  mm.fit();
}
</script>

</body>
</html>
